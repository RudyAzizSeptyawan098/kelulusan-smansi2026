<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan - SMA Negeri 1 Singorojo</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0d47a1, #1976d2);
    text-align: center;
    color: white;
}

.container {
    max-width: 500px;
    margin: 80px auto;
    background: white;
    color: #333;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 { color: #0d47a1; }

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #0d47a1;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1565c0;
}

.result {
    margin-top: 20px;
    padding: 20px;
    border-radius: 10px;
    display: none;
}

.lulus {
    background: #e8f5e9;
    color: #2e7d32;
}

.tidak {
    background: #ffebee;
    color: #c62828;
}

.footer {
    margin-top: 15px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
    <h1>PENGUMUMAN KELULUSAN</h1>
    <h2>SMA Negeri 1 Singorojo</h2>
    <p>Masukkan NISN dan Nama Lengkap</p>

    <input type="text" id="nisn" placeholder="Masukkan NISN">
    <input type="text" id="nama" placeholder="Masukkan Nama Lengkap">

    <button onclick="cekKelulusan()">Cek Kelulusan</button>

    <div id="hasil" class="result"></div>

    <div class="footer">© 2026 SMA Negeri 1 Singorojo</div>
</div>

<script>
/* =========================
   🔴 GANTI LINK INI SAJA
========================= */
const API_URL = "https://script.google.com/macros/s/AKfycbabc123XYZ456/exec"";
/* ========================= */

async function cekKelulusan() {
    let nisn = document.getElementById("nisn").value.trim();
    let nama = document.getElementById("nama").value.trim().toUpperCase();
    let hasil = document.getElementById("hasil");

    if (!nisn || !nama) {
        hasil.className = "result tidak";
        hasil.innerHTML = "<p>Harap isi semua data</p>";
        hasil.style.display = "block";
        return;
    }

    hasil.className = "result";
    hasil.innerHTML = "<p>Memproses data...</p>";
    hasil.style.display = "block";

    try {
        const response = await fetch(API_URL);
        const data = await response.json();

        const siswa = data.find(
            s => s.nisn == nisn && s.nama == nama
        );

        if (siswa) {
            if (siswa.status === "LULUS") {
                hasil.className = "result lulus";
                hasil.innerHTML = `
                    <h2>SELAMAT!</h2>
                    <p>Anda dinyatakan <b>LULUS</b></p>
                `;
            } else {
                hasil.className = "result tidak";
                hasil.innerHTML = `
                    <h2>MOHON MAAF</h2>
                    <p>Anda dinyatakan <b>TIDAK LULUS</b></p>
                `;
            }
        } else {
            hasil.className = "result tidak";
            hasil.innerHTML = `
                <h3>Data tidak ditemukan</h3>
                <p>Cek kembali NISN dan Nama</p>
            `;
        }

    } catch (error) {
        hasil.className = "result tidak";
        hasil.innerHTML = "<p>Gagal mengambil data</p>";
    }
}
</script>

</body>
</html>
