<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan - SMA Negeri 1 Singorojo</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0d47a1, #1976d2);
    text-align: center;
    color: white;
}

.container {
    max-width: 500px;
    margin: 80px auto;
    background: white;
    color: #333;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 { color: #0d47a1; }

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #0d47a1;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1565c0;
}

.result {
    margin-top: 20px;
    padding: 20px;
    border-radius: 10px;
    display: none;
}

.lulus {
    background: #e8f5e9;
    color: #2e7d32;
}

.tidak {
    background: #ffebee;
    color: #c62828;
}
</style>
</head>

<body>

<div class="container">
    <h1>PENGUMUMAN KELULUSAN</h1>
    <h2>SMA Negeri 1 Singorojo</h2>

    <input type="text" id="nisn" placeholder="Masukkan NISN">

    <input type="text" id="nama" placeholder="Masukkan Nama Lengkap"
           oninput="this.value = this.value.toUpperCase()">

    <button onclick="cekKelulusan()">Cek Kelulusan</button>

    <div id="hasil" class="result"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxgE2Wk2Cj-wmo8K0joHx18HGkkYFTI4Cw-JN0EMamBdl1w5cSpkpEzLBYUIZxx3TzB/exec";

function normalize(text) {
    return text.toLowerCase().replace(/\\s+/g, " ").trim();
}

async function cekKelulusan() {
    const nisn = document.getElementById("nisn").value.trim();
    const nama = document.getElementById("nama").value.trim();
    const hasil = document.getElementById("hasil");

    if (!nisn || !nama) {
        hasil.className = "result tidak";
        hasil.innerHTML = "<p>Harap isi semua data</p>";
        hasil.style.display = "block";
        return;
    }

    hasil.style.display = "block";
    hasil.innerHTML = "<p>Memproses...</p>";

    try {
        const response = await fetch(API_URL);
        const data = await response.json();

        const siswa = data.find(s => 
            s.nisn.toString().trim() === nisn &&
            normalize(s.nama) === normalize(nama)
        );

        if (siswa) {
            if (siswa.status === "LULUS") {
                hasil.className = "result lulus";
                hasil.innerHTML = `
                    <h2>SELAMAT! ANDA LULUS</h2>
                    <br>
                    <a href="${siswa.link_pdf}" target="_blank">
                        <button>Download Surat Kelulusan</button>
                    </a>
                `;
            } else {
                hasil.className = "result tidak";
                hasil.innerHTML = "<h2>MOHON MAAF, ANDA TIDAK LULUS</h2>";
            }
        } else {
            hasil.className = "result tidak";
            hasil.innerHTML = "<p>Data tidak ditemukan</p>";
        }

    } catch (error) {
        hasil.className = "result tidak";
        hasil.innerHTML = "<p>Error mengambil data</p>";
    }
}
</script>

</body>
</html>
